{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Product</title>
  <link rel="stylesheet" href="{% static 'products/base.css' %}">
</head>
<body>

<div class="layout">

  <aside class="sidebar">
    <a href="{% url 'home' %}" class="sidebar-brand">
      <span></span> Shelf
    </a>
    <nav class="sidebar-nav">
      <a href="{% url 'home' %}" class="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
        Products
      </a>
      <a href="{% url 'add-product' %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
        </svg>
        Add Product
      </a>
      <a href="{% url 'add-category' %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 6h16M4 12h16M4 18h7"/>
        </svg>
        Add Category
      </a>
    </nav>
  </aside>

  <main class="main">
    <div class="page-header">
      <h1>Edit Product</h1>
      <p>Update the details for this product.</p>
    </div>

    <div class="card" style="max-width: 560px;">
      <form method="post" enctype="multipart/form-data" class="django-form">
        {% csrf_token %}
        {{ form.as_p }}
        <div style="display:flex; gap:0.75rem; margin-top:2rem;">
          <button type="submit" class="btn btn-primary">Save Changes</button>
          <a href="{% url 'home' %}" class="btn btn-ghost">Cancel</a>
        </div>
      </form>
    </div>
  </main>

</div>

</body>
</html>
